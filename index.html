<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { padding: 15px 30px; margin: 10px; font-size: 16px; border-radius: 10px; border: none; background: #007bff; color: white; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h2>Mi Registro</h2>
    <button onclick="registrar('Entrada')">Registrar Entrada</button>
    <button onclick="registrar('Salida')">Registrar Salida</button>
    <button onclick="limpiar()" style="background: #dc3545;">Borrar Todo</button>
    
    <table id="tabla">
        <thead><tr><th>Tipo</th><th>Hora</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        function renderizar() {
            const data = JSON.parse(localStorage.getItem('registros') || '[]');
            const tbody = document.querySelector('#tabla tbody');
            tbody.innerHTML = data.map(r => `<tr><td>${r.tipo}</td><td>${r.fecha}</td></tr>`).join('');
        }

        function registrar(tipo) {
            const nuevo = { tipo, fecha: new Date().toLocaleString() };
            const data = JSON.parse(localStorage.getItem('registros') || '[]');
            data.push(nuevo);
            localStorage.setItem('registros', JSON.stringify(data));
            renderizar();
        }

        function limpiar() {
            if(confirm("¿Borrar historial?")) {
                localStorage.removeItem('registros');
                renderizar();
            }
        }
        renderizar();
    </script>
</body>
</html>
