<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema POS con Escáner de Barras</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .contenedor-principal { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .panel { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .campo { margin-bottom: 15px; display: flex; flex-direction: column; }
        input, button { padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background: #007bff; color: #fff; border: none; }
        button:hover { background: #0056b3; }
        #camara-escaner { width: 100%; height: 200px; background: #000; display: none; margin-bottom: 10px; }
        #camara-escaner video { width: 100%; height: 100%; object-fit: cover; }
        .lista-productos, .lista-carrito { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; }
        .tarjeta-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <div class="panel">
            <h2>Capturar Producto</h2>
            <form id="formularioProducto">
                <input type="hidden" id="idProductoEditar" value="">
                <div class="campo">
                    <label>Código</label>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="inputCodigo" required style="flex:1;">
                        <button type="button" id="btnIniciarEscaner">📷 Escanear</button>
                    </div>
                </div>
                <div id="camara-escaner"></div>
                <div class="campo"><label>Nombre</label><input type="text" id="inputNombre" required></div>
                <div class="campo"><label>Precio</label><input type="number" id="inputPrecio" step="0.01" required></div>
                <button type="submit" id="btnGuardar">Guardar</button>
            </form>
            <h2>Catálogo</h2>
            <div id="listaProductos" class="lista-productos"></div>
        </div>
        <div class="panel">
            <h2>Carrito</h2>
            <div id="listaCarrito" class="lista-carrito"></div>
            <div style="margin-top:10px; font-weight:bold;">Total: <span id="txtTotal">$0.00</span></div>
            <button id="btnCerrarVenta" style="width:100%; background:#28a745;">Cerrar Venta</button>
        </div>
    </div>

    <script>
        let catalogoProductos = JSON.parse(localStorage.getItem("catalogoProductos")) || [];
        let carrito = [];
        let escanerActivo = false;
        let modoOperacion = 'venta';

        const inputCodigo = document.getElementById('inputCodigo');
        const inputNombre = document.getElementById('inputNombre');
        const inputPrecio = document.getElementById('inputPrecio');
        const idProductoEditar = document.getElementById('idProductoEditar');
        const listaProductos = document.getElementById('listaProductos');
        const listaCarrito = document.getElementById('listaCarrito');

        // Escáner
        document.getElementById('btnIniciarEscaner').addEventListener('click', () => {
            modoOperacion = (idProductoEditar.value !== "") ? 'alta' : 'venta';
            const visor = document.getElementById('camara-escaner');
            if (escanerActivo) { Quagga.stop(); visor.style.display = 'none'; escanerActivo = false; return; }
            visor.style.display = 'block'; escanerActivo = true;
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: visor, constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader", "upc_reader"] }
            }, (err) => { if (!err) Quagga.start(); });
        });

        Quagga.onDetected((data) => {
            if (!escanerActivo) return;
            const code = data.codeResult.code;
            Quagga.stop(); document.getElementById('camara-escaner').style.display = 'none'; escanerActivo = false;
            
            if (modoOperacion === 'alta') {
                inputCodigo.value = code;
            } else {
                const prod = catalogoProductos.find(p => p.codigo === code);
                if (prod) {
                    const item = carrito.find(i => i.codigo === prod.codigo);
                    if (item) item.cantidad++; else carrito.push({...prod, cantidad: 1});
                    renderizarCarrito();
                } else { alert("Producto no encontrado"); }
            }
        });

        // Formulario
        document.getElementById('formularioProducto').addEventListener('submit', (e) => {
            e.preventDefault();
            const prod = { codigo: inputCodigo.value, nombre: inputNombre.value, precio: parseFloat(inputPrecio.value) };
            const idx = catalogoProductos.findIndex(p => p.codigo === prod.codigo);
            if (idx > -1) catalogoProductos[idx] = prod; else catalogoProductos.push(prod);
            localStorage.setItem("catalogoProductos", JSON.stringify(catalogoProductos));
            renderizarCatalogo();
            e.target.reset();
        });

        function renderizarCatalogo() {
            listaProductos.innerHTML = '';
            catalogoProductos.forEach(p => {
                listaProductos.innerHTML += `<div class="tarjeta-item" onclick="agregarAlCarrito('${p.codigo}')">
                    ${p.nombre} - $${p.precio}</div>`;
            });
        }

        window.agregarAlCarrito = (code) => {
            const prod = catalogoProductos.find(p => p.codigo === code);
            const item = carrito.find(i => i.codigo === code);
            if (item) item.cantidad++; else carrito.push({...prod, cantidad: 1});
            renderizarCarrito();
        };

        function renderizarCarrito() {
            listaCarrito.innerHTML = '';
            let total = 0;
            carrito.forEach(i => {
                total += i.precio * i.cantidad;
                listaCarrito.innerHTML += `<div class="tarjeta-item">${i.nombre} (x${i.cantidad}) - $${(i.precio*i.cantidad).toFixed(2)}</div>`;
            });
            document.getElementById('txtTotal').textContent = '$' + total.toFixed(2);
        }

        renderizarCatalogo();
    </script>
</body>
</html>
